name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (typecheck + vite + plugin pipeline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc --noEmit && vite build)
        run: npm run build

      - name: Build a plugin (guards the plugin pipeline)
        run: |
          # The core ships no committed plugins (plugins/ is gitignored), so exercise
          # scripts/build-plugin.mjs + the esbuild pipeline against a tiny fixture.
          mkdir -p /tmp/ci-plugin
          printf '%s' '{"id":"com.nodra.ci","name":"CI","version":"1.0.0","api_version":"1.0.0","permissions":[],"main":"index.js"}' > /tmp/ci-plugin/manifest.json
          printf 'export function register() {}\n' > /tmp/ci-plugin/index.ts
          node scripts/build-plugin.mjs /tmp/ci-plugin --no-zip
